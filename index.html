<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskless Forms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   TASKLESS FORMS — Production v2.0
   All 12 comments implemented
═══════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── System-aware theme ── */
:root {
  --p1: #2563EB;
  --p2: #7C3AED;
  --bg: #080C14;
  --surface: #0D1117;
  --surface2: #111827;
  --border: rgba(37,99,235,0.18);
  --border-h: rgba(37,99,235,0.45);
  --text: #F8FAFC;
  --muted: rgba(248,250,252,0.45);
  --dimmer: rgba(248,250,252,0.2);
  --err: #ef4444;
  --ok: #22c55e;
  --btn-grad: linear-gradient(135deg, var(--p1), var(--p2));
  --glow: 0 0 30px rgba(37,99,235,0.15), 0 0 60px rgba(124,58,237,0.08);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #EFF6FF;
    --surface: #FFFFFF;
    --surface2: #F0F4FF;
    --border: rgba(37,99,235,0.2);
    --border-h: rgba(37,99,235,0.5);
    --text: #0F172A;
    --muted: rgba(15,23,42,0.5);
    --dimmer: rgba(15,23,42,0.25);
    --glow: 0 8px 40px rgba(37,99,235,0.12), 0 2px 12px rgba(124,58,237,0.08);
  }
}

/* ── Arabic font override ── */
[dir="rtl"] body,
[dir="rtl"] input,
[dir="rtl"] select,
[dir="rtl"] textarea,
[dir="rtl"] button {
  font-family: 'Cairo', sans-serif;
}

/* ── Base ── */
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem 3rem;
  overflow-x: hidden;
  position: relative;
}

/* ═══════════════════════════════════════
   ANIMATED BACKGROUND
═══════════════════════════════════════ */
.bg-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  animation: orbFloat 8s ease-in-out infinite;
}
.bg-orb-1 {
  width: 500px; height: 500px;
  background: var(--p1);
  top: -10%; left: -10%;
  animation-delay: 0s;
}
.bg-orb-2 {
  width: 400px; height: 400px;
  background: var(--p2);
  bottom: -5%; right: -5%;
  animation-delay: -3s;
}
.bg-orb-3 {
  width: 300px; height: 300px;
  background: #06B6D4;
  top: 40%; left: 50%;
  transform: translateX(-50%);
  animation-delay: -5s;
}

@keyframes orbFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50%       { transform: translateY(-30px) scale(1.05); }
}

.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Floating particles */
.particle {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--p1);
  border-radius: 50%;
  opacity: 0;
  animation: particleFly linear infinite;
}

@keyframes particleFly {
  0%   { opacity: 0; transform: translateY(100vh) scale(0); }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
}

/* ═══════════════════════════════════════
   LANGUAGE TOGGLE
═══════════════════════════════════════ */
.lang-bar {
  position: relative; z-index: 10;
  display: flex; justify-content: flex-end;
  width: 100%; max-width: 480px;
  margin-bottom: 1rem;
}

.lang-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
}

.lang-btn {
  padding: 5px 14px;
  border-radius: 100px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}
.lang-btn.active {
  background: var(--btn-grad);
  color: #fff;
}

/* ═══════════════════════════════════════
   TASKLESS HEADER (default form only)
═══════════════════════════════════════ */
.tl-header {
  position: relative; z-index: 10;
  text-align: center;
  margin-bottom: 1.5rem;
  animation: fadeDown 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes fadeDown {
  from { opacity:0; transform: translateY(-12px); }
  to   { opacity:1; transform: translateY(0); }
}

.tl-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
}

/* SVG T logo */
.tl-logo-icon {
  width: 44px; height: 44px;
}

.tl-wordmark {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.08em;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.75) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

@media (prefers-color-scheme: light) {
  .tl-wordmark {
    background: linear-gradient(135deg, #0F172A, #1E3A8A);
    -webkit-background-clip: text;
    background-clip: text;
  }
}

.tl-tagline {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.01em;
}

/* ═══════════════════════════════════════
   FORM CARD
═══════════════════════════════════════ */
.tf-wrap {
  position: relative; z-index: 10;
  width: 100%; max-width: 480px;
}

.tf-card {
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--glow);
  animation: cardEntrance 0.55s cubic-bezier(0.16,1,0.3,1) both;
  animation-delay: 0.1s;
}

@keyframes cardEntrance {
  from { opacity:0; transform: translateY(24px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* ── Card header ── */
.tf-card-header {
  padding: 2rem 1.75rem 1.5rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.tf-card-header::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--header-grad, linear-gradient(160deg, rgba(37,99,235,0.1), transparent 65%));
  pointer-events: none;
}

/* Client logo */
.tf-logo-wrap {
  margin-bottom: 14px;
}
.tf-logo-img {
  height: 52px;
  object-fit: contain;
  display: block;
  margin: 0 auto;
}
.tf-logo-initial {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--btn-grad);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700; color: #fff;
  box-shadow: 0 4px 20px rgba(37,99,235,0.35);
}

.tf-client-name {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: var(--btn-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.tf-form-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 6px;
}

.tf-form-subtitle {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

.tf-divider {
  height: 1px;
  background: var(--border);
  margin: 1.25rem 0 0;
}

/* ── Card body ── */
.tf-card-body {
  padding: 1.5rem 1.5rem 1.25rem;
}

/* ═══════════════════════════════════════
   FIELDS — with scroll animation
═══════════════════════════════════════ */
.tf-field {
  margin-bottom: 16px;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.tf-field.visible {
  opacity: 1;
  transform: translateY(0);
}

.tf-label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 7px;
  letter-spacing: 0.02em;
}
.tf-label .req { color: var(--err); }

/* Input wrapper with icon */
.tf-input-wrap {
  position: relative;
}
.tf-input-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--dimmer);
  pointer-events: none;
  flex-shrink: 0;
  transition: color 0.18s;
}
[dir="rtl"] .tf-input-icon {
  left: auto; right: 14px;
}
.tf-input-wrap.has-icon input,
.tf-input-wrap.has-icon select {
  padding-left: 42px;
}
[dir="rtl"] .tf-input-wrap.has-icon input,
[dir="rtl"] .tf-input-wrap.has-icon select {
  padding-left: 14px;
  padding-right: 42px;
}

/* Qatar phone prefix */
.tf-phone-prefix {
  position: absolute;
  left: 42px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
  pointer-events: none;
  user-select: none;
}
[dir="rtl"] .tf-phone-prefix {
  left: auto; right: 42px;
}
.tf-input-wrap.phone-wrap input {
  padding-left: 90px !important;
}
[dir="rtl"] .tf-input-wrap.phone-wrap input {
  padding-left: 14px !important;
  padding-right: 90px !important;
}

/* ── Checkmark badge (filled state) ── */
.tf-filled-badge {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--ok);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
[dir="rtl"] .tf-filled-badge {
  right: auto; left: 12px;
}
.tf-filled-badge.show { opacity: 1; }
.tf-filled-badge svg { width: 10px; height: 10px; }

/* ── Base input styles ── */
.tf-input, .tf-select, .tf-textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 11px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
  -webkit-appearance: none;
}
.tf-input::placeholder,
.tf-textarea::placeholder { color: var(--dimmer); }

.tf-input:focus, .tf-select:focus, .tf-textarea:focus {
  border-color: var(--p1);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}
.tf-input:focus ~ .tf-input-icon,
.tf-select:focus ~ .tf-input-icon { color: var(--p1); }
.tf-input.filled:not(:focus) {
  border-color: rgba(34,197,94,0.4);
}
.tf-input.error, .tf-select.error, .tf-textarea.error {
  border-color: var(--err);
  box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
}

.tf-select { cursor: pointer; }
.tf-textarea {
  min-height: 96px; resize: vertical;
  line-height: 1.55; padding-left: 42px;
}
[dir="rtl"] .tf-textarea { padding-left: 14px; padding-right: 42px; }

.tf-select-arrow {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--muted);
}
[dir="rtl"] .tf-select-arrow { right: auto; left: 14px; }

/* Date input */
input[type="date"]::-webkit-calendar-picker-indicator {
  background: transparent;
  cursor: pointer;
  opacity: 0.5;
  filter: invert(1);
}
@media (prefers-color-scheme: light) {
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: none;
    opacity: 0.6;
  }
}

/* ── Error message ── */
.tf-err-msg {
  font-size: 11px;
  color: var(--err);
  margin-top: 5px;
  display: none;
  align-items: center;
  gap: 4px;
}
.tf-err-msg.show { display: flex; }

/* ═══════════════════════════════════════
   CONSENT
═══════════════════════════════════════ */
.tf-consent-wrap {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 13px 14px;
  margin-bottom: 6px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 11px;
  transition: border-color 0.18s;
  cursor: pointer;
}
.tf-consent-wrap:hover { border-color: var(--border-h); }
.tf-consent-wrap.error { border-color: var(--err); }

.tf-consent-wrap input[type="checkbox"] {
  margin-top: 2px; flex-shrink: 0;
  width: 16px; height: 16px;
  accent-color: var(--p1);
  cursor: pointer;
}
.tf-consent-text {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.65;
  cursor: pointer;
}
.tf-consent-text a {
  color: var(--p1);
  text-decoration: none;
}
.tf-consent-text a:hover { text-decoration: underline; }

/* ═══════════════════════════════════════
   SUBMIT BUTTON
═══════════════════════════════════════ */
.tf-submit {
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  background: var(--btn-grad);
  border: none; border-radius: 11px;
  color: #fff;
  font-size: 15px; font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.015em;
  transition: opacity 0.18s, transform 0.12s, box-shadow 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.3);
  position: relative;
  overflow: hidden;
}
.tf-submit::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}
.tf-submit:hover:not(:disabled) {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(37,99,235,0.4);
}
.tf-submit:active:not(:disabled) {
  transform: scale(0.985) translateY(0);
}
.tf-submit:disabled { opacity: 0.55; cursor: not-allowed; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════
   FOOTER
═══════════════════════════════════════ */
.tf-card-footer {
  text-align: center;
  padding: 12px;
  border-top: 1px solid var(--border);
}
.tf-powered {
  font-size: 11px;
  color: var(--dimmer);
  text-decoration: none;
  transition: color 0.18s;
  display: inline-flex; align-items: center; gap: 4px;
}
.tf-powered:hover { color: var(--p1); }

/* ═══════════════════════════════════════
   TRUST BADGES (Taskless default only)
═══════════════════════════════════════ */
.tf-trust {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  width: 100%; max-width: 480px;
  margin-top: 1.5rem;
  animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  animation-delay: 0.3s;
  position: relative; z-index: 10;
}
@media (max-width: 380px) {
  .tf-trust { grid-template-columns: repeat(2, 1fr); }
}

.tf-trust-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  text-align: center;
}
.tf-trust-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--p1);
  background: var(--surface);
}
.tf-trust-title {
  font-size: 11px; font-weight: 600;
  color: var(--text);
}
.tf-trust-sub {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

/* ═══════════════════════════════════════
   SUCCESS STATE
═══════════════════════════════════════ */
.tf-success {
  padding: 2.5rem 1.5rem;
  text-align: center;
  display: none;
  animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1);
}
.tf-success.show { display: block; }

.tf-success-ring {
  width: 68px; height: 68px;
  border-radius: 50%;
  background: var(--btn-grad);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
  box-shadow: 0 0 0 12px rgba(37,99,235,0.08);
  font-size: 28px;
}
.tf-success h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--text); margin-bottom: 8px;
}
.tf-success p {
  font-size: 13px; color: var(--muted);
  line-height: 1.7; max-width: 300px;
  margin: 0 auto 1.75rem;
}
.tf-reset-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--muted); padding: 9px 24px;
  border-radius: 9px; cursor: pointer;
  font-size: 13px; font-family: inherit;
  transition: all 0.18s;
}
.tf-reset-btn:hover {
  border-color: var(--border-h); color: var(--text);
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ── Animated background ── -->
<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div id="particles"></div>
</div>

<!-- ── Language toggle ── -->
<div class="lang-bar">
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ar')">ع</button>
  </div>
</div>

<!-- ── Taskless header (shown on default form, hidden for client forms) ── -->
<div class="tl-header" id="tl-header">
  <div class="tl-logo">
    <!-- Taskless T Logo SVG -->
    <svg class="tl-logo-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#2563EB"/>
          <stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
      </defs>
      <path d="M8 12 C8 12 14 8 22 8 C30 8 36 12 36 12 L36 16 C36 16 30 13 22 13 C14 13 8 16 8 16 Z" fill="url(#tGrad)"/>
      <path d="M20 14 L20 36 C20 36 21 37 22 37 C23 37 24 36 24 36 L24 14 Z" fill="url(#tGrad)" opacity="0.9"/>
      <path d="M20 28 C20 28 16 32 14 36" stroke="url(#tGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    </svg>
    <span class="tl-wordmark">TASKLESS</span>
  </div>
  <div class="tl-tagline" id="tl-tagline">Automate requests. Save time. Focus on what matters.</div>
</div>

<!-- ── Form wrapper ── -->
<div class="tf-wrap">
  <div class="tf-card" id="tf-card">

    <!-- Header -->
    <div class="tf-card-header" id="tf-header">
      <div class="tf-logo-wrap" id="tf-logo"></div>
      <div class="tf-client-name" id="tf-client-name"></div>
      <div class="tf-form-title" id="tf-form-title"></div>
      <div class="tf-form-subtitle" id="tf-form-subtitle"></div>
      <div class="tf-divider"></div>
    </div>

    <!-- Body -->
    <div class="tf-card-body" id="tf-card-body">

      <!-- Fields injected here -->
      <div id="tf-fields"></div>

      <!-- Consent -->
      <div class="tf-consent-wrap" id="tf-consent-box" onclick="toggleConsent()">
        <input type="checkbox" id="tf-consent" onclick="event.stopPropagation(); toggleConsent()">
        <label class="tf-consent-text" id="tf-consent-text" for="tf-consent"></label>
      </div>
      <div class="tf-err-msg" id="tf-consent-err">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="6" r="5.5" stroke="#ef4444"/>
          <path d="M6 3.5v3M6 8v.5" stroke="#ef4444" stroke-linecap="round"/>
        </svg>
        <span id="tf-consent-err-text"></span>
      </div>

      <!-- Submit -->
      <button class="tf-submit" id="tf-submit" onclick="handleSubmit()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2L10 6H14L11 9L12 13L8 11L4 13L5 9L2 6H6L8 2Z" fill="currentColor" opacity="0.9"/>
        </svg>
        <span id="tf-btn-text"></span>
      </button>
    </div>

    <!-- Success state -->

function iconSVG(type) {
  const path = ICONS[type] || ICONS.text;
  return `<svg viewBox="0 0 24 24" fill="none" width="16" height="16">${path}</svg>`;
}

// ── Validation rules ──────────────────────────────────────────────────
const ALLOWED_CHARS = /^[a-zA-Z\u0600-\u06FF\u0750-\u077F\s0-9@._,'\-+:/()\n]+$/;

function validate(field, value) {
  const t = I18N[LANG];
  const v = (value || '').trim();

  if (field.required && !v) return t.required;

  if (!v) return null; // optional empty fields are fine

  // Security: block special chars except allowed ones
  if (!ALLOWED_CHARS.test(v)) return t.invalidChars;

  if (field.type === 'email') {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return t.invalidEmail;
  }
  if (field.type === 'phone') {
    // Expect exactly 8 digits (Qatar: +974 then 8 digits)
    if (!/^\d{8}$/.test(v)) return t.invalidPhone;
  }
  if (field.id === 'name' || field.type === 'name') {
    if (!/^[a-zA-Z\u0600-\u06FF\u0750-\u077F\s.'-]+$/.test(v)) return t.invalidName;
  }
  return null;
}

// ── Current state ─────────────────────────────────────────────────────
let CONFIG    = null;
let VALUES    = {};
let SUBMITTED = false;
let CONSENT   = false;

// ── Default Taskless config (shown at forms.tasklesshub.com) ──────────

// ── Boot ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  spawnParticles();
  const slug = getSlug();
  if (!slug || slug === 'taskless' || slug === '') {
    loadConfig(DEFAULT_CONFIG);
  } else {
    fetchConfig(slug);
  }
  setupScrollAnimations();
});

function getSlug() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts[parts.length - 1] || '';
}

// ── Fetch config from n8n ─────────────────────────────────────────────
async function fetchConfig(slug) {
  try {
    const res = await fetch(`${CONFIG_API}?slug=${encodeURIComponent(slug)}`);
    if (!res.ok) throw new Error();
    const cfg = await res.json();
    loadConfig(cfg);
  } catch {
    // Fallback to default if fetch fails
    loadConfig(DEFAULT_CONFIG);
  }
}

// ── Apply config to form ──────────────────────────────────────────────
function loadConfig(cfg) {
  CONFIG   = cfg;
  VALUES   = {};
  SUBMITTED= false;
  CONSENT  = false;

  // CSS variables for client branding
  const r = document.documentElement;
  r.style.setProperty('--p1', cfg.primaryColor || '#2563EB');
  r.style.setProperty('--p2', cfg.secondaryColor || '#7C3AED');
  r.style.setProperty('--btn-grad', `linear-gradient(135deg, ${cfg.primaryColor||'#2563EB'}, ${cfg.secondaryColor||'#7C3AED'})`);
  r.style.setProperty('--header-grad', `linear-gradient(160deg, ${cfg.primaryColor||'#2563EB'}15, transparent 65%)`);
  r.style.setProperty('--border', `${cfg.primaryColor||'#2563EB'}25`);
  r.style.setProperty('--border-h', `${cfg.primaryColor||'#2563EB'}55`);
  r.style.setProperty('--glow', `0 0 40px ${cfg.primaryColor||'#2563EB'}18, 0 0 80px ${cfg.secondaryColor||'#7C3AED'}0A`);

  // Taskless header visibility
  const tlHeader = document.getElementById('tl-header');
  const tlTrust  = document.getElementById('tf-trust');
  if (cfg.showTasklessHeader) {
    tlHeader.style.display = '';
    tlTrust.style.display  = '';
  } else {
    tlHeader.style.display = 'none';
    tlTrust.style.display  = 'none';
  }

  // Render the form with current language
  renderForm();
}

// ── Render form based on current lang ────────────────────────────────
function renderForm() {
  if (!CONFIG) return;
  const cfg = CONFIG;
  const t   = I18N[LANG];
  const L   = LANG;

  const txt = (val) => typeof val === 'object' ? (val[L] || val.en || '') : (val || '');

  // Logo
  const logoEl = document.getElementById('tf-logo');
  if (cfg.logoUrl) {
    logoEl.innerHTML = `<img class="tf-logo-img" src="${cfg.logoUrl}" alt="${cfg.businessName}">`;
  } else {
    logoEl.innerHTML = `<div class="tf-logo-initial">${(cfg.logoText||cfg.businessName||'T').slice(0,2).toUpperCase()}</div>`;
  }

  document.getElementById('tf-client-name').textContent  = cfg.isDefault ? '' : cfg.businessName;
  document.getElementById('tf-form-title').textContent   = txt(cfg.formTitle);
  document.getElementById('tf-form-subtitle').textContent= txt(cfg.formSubtitle);
  document.getElementById('tf-btn-text').textContent     = txt(cfg.buttonText);
  document.getElementById('tf-consent-text').innerHTML   = cfg.consent ? txt(cfg.consent) : t.consent;
  document.getElementById('tf-consent-err-text').textContent = t.consentErr;
  document.getElementById('tf-reset-btn').textContent    = t.submitAnother;
  document.getElementById('tf-success-title').textContent= t.successTitle;
  document.getElementById('tf-auto-reply').textContent   = txt(cfg.autoReply);
  document.getElementById('tl-tagline').textContent      = t.tagline;

  // Trust badges i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key]) el.textContent = t[key];
  });

  // Build fields
  buildFields(cfg.fields);

  // Reset UI
  document.getElementById('tf-card-body').style.display = 'block';
  document.getElementById('tf-success').classList.remove('show');
  document.getElementById('tf-consent').checked = false;
  document.getElementById('tf-consent-box').classList.remove('error');
  document.getElementById('tf-consent-err').classList.remove('show');
  document.getElementById('tf-submit').disabled = false;
  document.getElementById('tf-btn-text').textContent = txt(cfg.buttonText);

  // Trigger scroll animations
  setTimeout(triggerFieldAnimations, 100);
}

// ── Build fields ──────────────────────────────────────────────────────
function buildFields(fields) {
  const container = document.getElementById('tf-fields');
  container.innerHTML = '';
  const t = I18N[LANG];
  const L = LANG;
  const txt = (val) => typeof val === 'object' ? (val[L] || val.en || '') : (val || '');

  fields.forEach((f, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'tf-field';
    wrap.style.transitionDelay = `${idx * 60}ms`;
    wrap.dataset.fieldId = f.id;

    // Label
    const label = document.createElement('div');
    label.className = 'tf-label';
    label.innerHTML = txt(f.label) + (f.required ? '<span class="req">*</span>' : '');

    // Input wrapper
    const inputWrap = document.createElement('div');
    inputWrap.className = 'tf-input-wrap has-icon';
    if (f.type === 'phone') inputWrap.classList.add('phone-wrap');

    // Icon
    const iconEl = document.createElement('div');
    iconEl.className = 'tf-input-icon';
    iconEl.innerHTML = iconSVG(f.type === 'name' ? 'name' : f.type);

    // Filled badge
    const badge = document.createElement('div');
    badge.className = 'tf-filled-badge';
    badge.id = `badge-${f.id}`;
    badge.innerHTML = `<svg viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    let inputEl;

    if (f.type === 'dropdown') {
      inputEl = document.createElement('select');
      inputEl.className = 'tf-select';
      const opts = typeof f.options === 'object' && !Array.isArray(f.options) ? (f.options[L] || f.options.en || []) : (f.options || []);
      inputEl.innerHTML = `<option value="" disabled selected>${t.selectOption}</option>`;
      opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = o;
        inputEl.appendChild(opt);
      });
      // Arrow
      const arrow = document.createElement('div');
      arrow.className = 'tf-select-arrow';
      arrow.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
      inputWrap.appendChild(arrow);

    } else if (f.type === 'textarea') {
      inputEl = document.createElement('textarea');
      inputEl.className = 'tf-textarea';
      inputEl.placeholder = txt(f.placeholder) || '';

    } else if (f.type === 'date') {
      inputEl = document.createElement('input');
      inputEl.type = 'date';
      inputEl.className = 'tf-input';

    } else {
      inputEl = document.createElement('input');
      inputEl.className = 'tf-input';
      inputEl.type = f.type === 'email' ? 'email' : f.type === 'phone' ? 'tel' : 'text';
      inputEl.placeholder = f.type === 'phone' ? t.phonePlaceholder : (txt(f.placeholder) || '');
      if (f.type === 'phone') inputEl.maxLength = 8;
    }

    inputEl.dataset.fieldId  = f.id;
    inputEl.dataset.fieldType= f.type;
    inputEl.dataset.required = f.required;

    // Qatar phone prefix
    if (f.type === 'phone') {
      const prefix = document.createElement('span');
      prefix.className = 'tf-phone-prefix';
      prefix.textContent = '+974';
      inputWrap.appendChild(prefix);
    }

    // Live events
    const onInput = () => {
      VALUES[f.id] = inputEl.value;
      clearFieldError(f.id);
      // Show filled badge if value exists and no error
      const filled = inputEl.value.trim().length > 0;
      document.getElementById(`badge-${f.id}`)?.classList.toggle('show', filled);
      if (filled) inputEl.classList.add('filled');
      else inputEl.classList.remove('filled');
    };

    inputEl.addEventListener('input', onInput);
    inputEl.addEventListener('change', onInput);

    // Error message
    const errMsg = document.createElement('div');
    errMsg.className = 'tf-err-msg';
    errMsg.id = `err-${f.id}`;
    errMsg.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="#ef4444"/><path d="M6 3.5v3M6 8v.5" stroke="#ef4444" stroke-linecap="round"/></svg><span></span>`;

    inputWrap.appendChild(iconEl);
    inputWrap.appendChild(inputEl);
    if (f.type !== 'textarea') inputWrap.appendChild(badge);

    wrap.appendChild(label);
    wrap.appendChild(inputWrap);
    wrap.appendChild(errMsg);
    container.appendChild(wrap);
  });
}

// ── Consent toggle ────────────────────────────────────────────────────
function toggleConsent() {
  const cb = document.getElementById('tf-consent');
  CONSENT = cb.checked;
  if (CONSENT) {
    document.getElementById('tf-consent-box').classList.remove('error');
    document.getElementById('tf-consent-err').classList.remove('show');
  }
}

// ── Scroll-based field animation ──────────────────────────────────────
function setupScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.tf-field').forEach(f => observer.observe(f));
}

function triggerFieldAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.tf-field').forEach(f => observer.observe(f));
}

// ── Show / clear field errors ─────────────────────────────────────────
function showFieldError(id, msg) {
  const errEl = document.getElementById(`err-${id}`);
  const inp   = document.querySelector(`[data-field-id="${id}"]`);
  if (errEl) { errEl.querySelector('span').textContent = msg; errEl.classList.add('show'); }
  if (inp)   inp.classList.add('error');
}
function clearFieldError(id) {
  const errEl = document.getElementById(`err-${id}`);
  const inp   = document.querySelector(`[data-field-id="${id}"]`);
  if (errEl) errEl.classList.remove('show');
  if (inp)   inp.classList.remove('error');
}

// ── Submit ────────────────────────────────────────────────────────────
async function handleSubmit() {
  if (!CONFIG || SUBMITTED) return;
  const t = I18N[LANG];
  let hasError = false;

  // Validate all fields
  CONFIG.fields.forEach(f => {
    const val = VALUES[f.id] || '';
    const err = validate(f, val);
    if (err) { showFieldError(f.id, err); hasError = true; }
  });

  // Consent check
  CONSENT = document.getElementById('tf-consent').checked;
  if (!CONSENT) {
    document.getElementById('tf-consent-box').classList.add('error');
    document.getElementById('tf-consent-err').classList.add('show');
    hasError = true;
  }

  if (hasError) return;

  // Build phone value with +974 prefix
  const processedValues = { ...VALUES };
  if (processedValues.phone) {
    processedValues.phone = '+974' + processedValues.phone.replace(/\D/g, '');
  }

  // ── n8n payload ──────────────────────────────────────────────────
  const payload = {
    client_id:  CONFIG.client_id,
    slug:       CONFIG.slug,
    timestamp:  new Date().toISOString(),
    language:   LANG,
    consent:    true,
    form_data:  processedValues,
    meta: { source: 'taskless-forms', version: '2.0.0' }
  };

  // Loading state
  SUBMITTED = true;
  const btn  = document.getElementById('tf-submit');
  const btxt = document.getElementById('tf-btn-text');
  btn.disabled = true;
  btxt.innerHTML = `<span class="spinner"></span>${t.loading}`;

  try {
    await fetch(CONFIG.n8nWebhook || SUBMIT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch (_) { /* show success regardless for offline demo */ }

  // Show success
  setTimeout(() => {
    document.getElementById('tf-card-body').style.display = 'none';
    document.getElementById('tf-success').classList.add('show');
  }, 700);
}

// ── Reset ─────────────────────────────────────────────────────────────
function resetForm() {
  SUBMITTED = false;
  VALUES    = {};
  CONSENT   = false;
  document.getElementById('tf-success').classList.remove('show');
  document.getElementById('tf-card-body').style.display = 'block';
  document.getElementById('tf-consent').checked = false;
  document.getElementById('tf-consent-box').classList.remove('error');
  document.getElementById('tf-consent-err').classList.remove('show');
  const cfg = CONFIG;
  const txt = (val) => typeof val === 'object' ? (val[LANG] || val.en || '') : (val || '');
  document.getElementById('tf-submit').disabled = false;
  document.getElementById('tf-btn-text').textContent = txt(cfg.buttonText);
  buildFields(cfg.fields);
  setTimeout(triggerFieldAnimations, 100);
}

// ── Language switch ───────────────────────────────────────────────────
function setLang(lang) {
  LANG = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && lang === 'en') || (i === 1 && lang === 'ar'));
  });
  renderForm();
}

// ── Floating particles ────────────────────────────────────────────────
function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${2 + Math.random() * 3}px;
      height: ${2 + Math.random() * 3}px;
      animation-duration: ${8 + Math.random() * 12}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: ${0.3 + Math.random() * 0.4};
      background: ${Math.random() > 0.5 ? '#2563EB' : '#7C3AED'};
    `;
    container.appendChild(p);
  }
}
</script>
